<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-900 min-h-screen font-sans text-gray-100">

    <div id="login" class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-sm bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700 fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-black rounded-full mx-auto flex items-center justify-center mb-4 border border-gray-600">
                    <i class="fa-solid fa-taxi text-3xl text-yellow-400"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Driver Partner</h1>
            </div>
            <input id="dName" placeholder="Enter your Name" class="w-full bg-gray-700 border border-gray-600 text-white p-3 rounded-xl mb-4 focus:ring-2 focus:ring-yellow-400 outline-none">
            <button onclick="dLogin()" class="w-full bg-yellow-400 text-black font-bold p-3 rounded-xl hover:bg-yellow-300 transition">
                Go Online
            </button>
        </div>
    </div>

    <div id="dash" class="hidden max-w-md mx-auto min-h-screen bg-black relative shadow-2xl">
        
        <div class="bg-gray-900 p-4 flex justify-between items-center border-b border-gray-800 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center">
                    <i class="fa-solid fa-user text-gray-300"></i>
                </div>
                <div>
                    <p id="dUser" class="font-bold text-white text-lg"></p>
                    <p class="text-xs text-green-400 font-bold"><i class="fa-solid fa-circle text-[8px] mr-1"></i> ONLINE</p>
                </div>
            </div>
            <button onclick="dLogout()" class="bg-gray-800 px-3 py-1 rounded-full text-xs font-bold text-red-400 border border-gray-700">
                GO OFFLINE
            </button>
        </div>

        <div class="p-4 space-y-4 pb-20">
            
            <div id="activeJob" class="hidden"></div>
            <div id="poolInvites" class="space-y-2"></div>
            <div>
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 ml-1">New Requests</h3>
                <div id="rideList" class="space-y-3">
                    <p class="text-center text-gray-600 py-10 text-sm">Scanning area for requests...</p>
                </div>
            </div>
        </div>
        
        <div id="msg" class="fixed bottom-20 left-0 right-0 text-center text-red-500 text-sm font-bold pointer-events-none"></div>

        <div class="absolute bottom-0 w-full bg-gray-900 border-t border-gray-800 p-4 flex justify-around text-gray-500">
            <i class="fa-solid fa-house text-white"></i>
            <i class="fa-solid fa-chart-simple"></i>
            <i class="fa-solid fa-gear"></i>
        </div>
    </div>

    <script>
        const BASE_URL = "http://127.0.0.1:9000";
        let dId = sessionStorage.getItem('dId');

        function dLogin() {
            const name = document.getElementById('dName').value;
            if(!name) return;
            fetch(`${BASE_URL}/driver/login`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({name})
            }).then(r=>r.json()).then(d => {
                sessionStorage.setItem('dId', d.id);
                sessionStorage.setItem('dName', d.name);
                dId = d.id;
                showDash();
            });
        }
        
        function dLogout() { sessionStorage.clear(); location.reload(); }

        function showDash() {
            document.getElementById('login').style.display='none';
            document.getElementById('dash').style.display='block';
            document.getElementById('dUser').innerText = sessionStorage.getItem('dName');
            poll();
            setInterval(poll, 3000);
        }

        async function poll() {
            if(!dId) return;
            const [jobRes, inviteRes, ridesRes] = await Promise.all([
                fetch(`${BASE_URL}/my_job/${dId}`).then(r=>r.json()),
                fetch(`${BASE_URL}/driver/pool_invites/${dId}`).then(r=>r.json()),
                fetch(`${BASE_URL}/rides?status=pending`).then(r=>r.json()) // Updated to fetch only pending
            ]);
            
            renderActive(jobRes);
            renderInvites(inviteRes);
            renderRides(ridesRes);
        }

        function renderActive(job) {
            const div = document.getElementById('activeJob');
            if(job.type === 'none') {
                div.style.display = 'none';
                return;
            }
            div.style.display = 'block';
            
            if(job.type === 'ride') {
                const r = job.data;
                div.innerHTML = `
                <div class="bg-gray-800 p-5 rounded-2xl border-l-4 border-blue-500 shadow-lg relative overflow-hidden">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-xs text-blue-400 font-bold uppercase mb-1">Current Passenger</p>
                            <h2 class="text-2xl font-bold text-white">${r.user_name}</h2>
                        </div>
                        <div class="bg-blue-900/30 p-2 rounded-full">
                            <i class="fa-solid fa-location-arrow text-blue-400 text-xl"></i>
                        </div>
                    </div>
                    <div class="space-y-2 text-sm text-gray-300 mb-6">
                         <div class="flex items-center gap-2"><i class="fa-regular fa-circle text-gray-500 text-[10px]"></i> ${r.source}</div>
                         <div class="h-4 border-l border-dashed border-gray-600 ml-[5px]"></div>
                         <div class="flex items-center gap-2"><i class="fa-solid fa-location-dot text-blue-500"></i> ${r.destination}</div>
                    </div>
                    <button onclick="finishRide(${r.id})" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-500 transition">Complete Drop-off</button>
                </div>`;
            } else {
                const p = job.data;
                const rideDone = p.ride.status === 'completed';
                const courierDone = p.courier.status === 'completed';

                // --- SEPARATE BUTTONS LOGIC ---
                let rideAction = rideDone 
                    ? `<span class="text-green-500 font-bold text-xs"><i class="fa-solid fa-check"></i> Done</span>`
                    : `<button onclick="finishRide(${p.ride.id})" class="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded hover:bg-blue-500">Drop off</button>`;
                
                let courierAction = courierDone
                    ? `<span class="text-green-500 font-bold text-xs"><i class="fa-solid fa-check"></i> Delivered</span>`
                    : `<button onclick="finishCourier(${p.courier.id})" class="bg-indigo-600 text-white text-xs font-bold px-3 py-1 rounded hover:bg-indigo-500">Deliver</button>`;

                div.innerHTML = `
                <div class="bg-gray-800 p-5 rounded-2xl border-l-4 border-indigo-500 shadow-lg relative">
                    <div class="flex items-center gap-2 mb-4 bg-indigo-900/20 p-2 rounded-lg">
                        <span class="bg-indigo-500 text-white text-xs px-2 py-1 rounded font-bold">POOL</span>
                    </div>
                    <div class="space-y-3 mb-4">
                        <div class="flex items-center justify-between p-3 bg-gray-700/50 rounded-xl">
                            <div><p class="text-xs text-gray-400">Passenger</p><p class="font-bold text-white">${p.ride.user_name}</p></div>
                            ${rideAction}
                        </div>
                        <div class="flex items-center justify-between p-3 bg-gray-700/50 rounded-xl">
                            <div><p class="text-xs text-gray-400">Package</p><p class="font-bold text-white">${p.courier.user_name}</p></div>
                            ${courierAction}
                        </div>
                    </div>
                </div>`;
            }
        }

        function renderInvites(list) {
            const div = document.getElementById('poolInvites');
            if(list.length === 0) { div.innerHTML = ''; return; }
            
            div.innerHTML = list.map(p => `
                <div class="bg-emerald-900/50 border border-emerald-500 p-4 rounded-2xl animate-pulse">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="bg-emerald-500 text-white p-2 rounded-lg"><i class="fa-solid fa-box"></i></div>
                        <div>
                            <h4 class="font-bold text-emerald-100">New Pickup Request!</h4>
                            <p class="text-xs text-emerald-300">Add package to current route?</p>
                        </div>
                    </div>
                    <button onclick="acceptPool(${p.id})" class="w-full mt-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded-lg text-sm transition">Accept (Update Route)</button>
                </div>
            `).join('');
        }

        function renderRides(list) {
            const div = document.getElementById('rideList');
            if(list.length === 0) {
                div.innerHTML = '<p class="text-center text-gray-600 py-10 text-sm">Scanning area for requests...</p>';
                return;
            }
            // --- UPDATED ACCEPT BUTTON WITH ERROR HANDLING ---
            div.innerHTML = list.map(r => `
                <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 flex justify-between items-center">
                    <div><h3 class="font-bold text-white">${r.user_name}</h3><p class="text-xs text-gray-400">${r.source} to ${r.destination}</p></div>
                    <div class="flex flex-col items-end gap-2"><span class="text-lg font-bold text-white">₹${r.price.toFixed(0)}</span><button onclick="takeRide(${r.id})" class="bg-white text-black text-xs font-bold px-4 py-2 rounded-lg hover:bg-gray-200 transition">Accept</button></div>
                </div>
            `).join('');
        }

        async function takeRide(id) { 
            if(!dId) {
                alert("You appear to be offline. Please Log Out and Log In again.");
                return;
            }
            try {
                const res = await fetch(`${BASE_URL}/accept_ride/${id}?driver_id=${dId}`, {method:'POST'});
                if(!res.ok) {
                    if(res.status === 404) {
                        alert("Error: Driver ID not found. The database was likely reset. Please click 'GO OFFLINE' and login again.");
                        dLogout();
                    } else {
                        throw await res.json();
                    }
                }
                poll();
            } catch(e) {
                const msg = document.getElementById('msg');
                msg.innerText = e.detail || "Failed to accept ride";
                setTimeout(() => msg.innerText = "", 3000);
            }
        }
        
        async function acceptPool(id) { 
            try {
                const res = await fetch(`${BASE_URL}/driver/accept_pool/${id}?driver_id=${dId}`, {method:'POST'});
                if(!res.ok) throw await res.json();
                poll(); 
            } catch(e) {
                document.getElementById('msg').innerText = e.detail || "Failed to accept pool";
                setTimeout(() => document.getElementById('msg').innerText = "", 3000);
            }
        }
        
        async function finishRide(id) { await fetch(`${BASE_URL}/complete_ride/${id}`, {method:'POST'}); poll(); }
        async function finishCourier(id) { await fetch(`${BASE_URL}/complete_courier/${id}`, {method:'POST'}); poll(); }

        if(sessionStorage.getItem('dId')) showDash();
    </script>
</body>
</html>
